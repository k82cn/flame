---
cluster:
  name: flame
  endpoint: "http://flame-session-manager:8080"
  slot: "cpu=1,mem=1g"
  policy: priority
  storage: fs://data/
  schedule_interval: 500           # Scheduler loop interval in milliseconds (default: 500)
executors:
  shim: host
  limits:
    max_executors: 10
cache:
  endpoint: "grpc://flame-executor-manager:9090"
  network_interface: "eth0"
  storage: "/var/lib/flame/cache"
  eviction:
    policy: "lru"
    max_memory: "512M"
    max_objects: 10000
