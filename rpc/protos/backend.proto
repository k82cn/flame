syntax = "proto3";

import "types.proto";

package flame;

option go_package = "github.com/flame-sh/flame/sdk/go/rpc";

/*
  The backend service of Flame, which is used to communicate with service sdk,
  e.g. register executor, invoke tasks and so on.
 */
service Backend {
  rpc RegisterNode(RegisterNodeRequest) returns (Result) {}
  rpc SyncNode(SyncNodeRequest) returns (SyncNodeResponse) {}
  rpc ReleaseNode(ReleaseNodeRequest) returns (Result) {}

  // NEW: Bidirectional streaming for node-executor synchronization
  // Replaces polling-based SyncNode with server-push mechanism
  rpc WatchNode(stream WatchNodeRequest) returns (stream WatchNodeResponse) {}

  rpc RegisterExecutor (RegisterExecutorRequest) returns (Result) {}
  rpc UnregisterExecutor (UnregisterExecutorRequest) returns (Result) {}

  rpc BindExecutor (BindExecutorRequest) returns (BindExecutorResponse) {}
  rpc BindExecutorCompleted (BindExecutorCompletedRequest) returns (Result) {}

  rpc UnbindExecutor (UnbindExecutorRequest) returns (Result) {}
  rpc UnbindExecutorCompleted (UnbindExecutorCompletedRequest) returns (Result) {}

  rpc LaunchTask (LaunchTaskRequest) returns (LaunchTaskResponse) {}
  rpc CompleteTask(CompleteTaskRequest) returns (Result) {}
}

message RegisterExecutorRequest {
  string executor_id = 1;
  ExecutorSpec executor_spec = 2;
}

message UnregisterExecutorRequest {
  string executor_id = 1;
}

message BindExecutorRequest {
  string executor_id = 1;
}

message BindExecutorResponse {
  optional Application application = 1;
  optional Session session = 2;
}

message BindExecutorCompletedRequest {
  string executor_id = 1;
}

message UnbindExecutorRequest {
  string executor_id = 1;
}

message UnbindExecutorCompletedRequest {
  string executor_id = 1;
}

message LaunchTaskRequest {
  string executor_id = 1;
}

message LaunchTaskResponse {
  // If no more task in the session, the result is empty.
  optional Task task = 1;
}

message CompleteTaskRequest {
  string executor_id = 1;
  TaskResult task_result = 2;
}

message RegisterNodeRequest {
  Node node = 1;
}

message ReleaseNodeRequest {
  string node_name = 1;
}

message SyncNodeRequest {
  Node node = 1;
  repeated Executor executors = 2;
}

message SyncNodeResponse {
  Node node = 1;
  repeated Executor executors = 2;
}

// WatchNode streaming messages

message WatchNodeRequest {
  oneof request {
    NodeRegistration registration = 1;  // Initial registration
    NodeHeartbeat heartbeat = 2;        // Periodic heartbeat with node status
  }
}

message NodeRegistration {
  Node node = 1;
}

message NodeHeartbeat {
  string node_name = 1;
  NodeStatus status = 2;
}

message WatchNodeResponse {
  oneof response {
    Executor executor = 1;       // Executor state update (client derives action from state)
    Acknowledgement ack = 2;     // Heartbeat acknowledgement
  }
}

message Acknowledgement {
  int64 timestamp = 1;
}
