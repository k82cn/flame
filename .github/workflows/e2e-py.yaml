name: Flame CI
on: [push, pull_request]
env:
  CLICOLOR_FORCE: 1
jobs:
  ci:
    name: Python E2E Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1
        with:
          version: latest
      
      - name: Generate TLS certificates
        run: |
          chmod +x ci/generate-certs.sh
          ci/generate-certs.sh ci/certs "flame-session-manager,flame-executor-manager,localhost,127.0.0.1"
      
      - name: Start Flame
        run: |
          docker compose up --build --force-recreate -d
      
      - name: Run Python E2E Test
        run: |
          make e2e-py-docker